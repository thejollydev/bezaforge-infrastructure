---
# Connection
ansible_host: 10.10.50.10
ansible_user: joseph

# Machine identity
hostname: forge-ai
timezone: America/Detroit
locale: en_US.UTF-8

# Feature flags
nfs_client: false

# ------------------------------------------------------------
# ollama role (see ansible/roles/ollama/defaults/main.yml for
# all knobs + commentary)
# ------------------------------------------------------------
# Models the role should ensure are pulled. `ollama pull` is
# idempotent, so the role no-ops on re-runs once the digest
# matches. Run `ollama list` on forge-ai to see what's currently
# loaded; copy the names + tags here so the role matches reality
# before the next playbook pass.
# Format: YAML list of bare model NAME:TAG values — names only, no
# IDs / sizes / dates from `ollama list`. Cloud models (SIZE shown
# as `-` in `ollama list`, suffix `-cloud`) are streamed from the
# Ollama cloud at inference time, not pulled locally — leave them
# out of this list. `gemma4:31b-cloud` is the current example;
# include it only if/when `ollama pull` supports cloud refs.
# Cognee was retired 2026-06-09 — every model previously seeded here
# (gemma4, nomic-embed-text, deepseek-r1-16k, devstral-32k, the
# Qwen3.6-35B GGUF + bge-m3) was pulled solely for the Cognee extraction
# experiment and was reclaimed in the live teardown (verified 2026-06-09).
# qwen3.6:27b is Brizza's Hermes-bridge Ollama fallback (BRIZZA-52:
# Codex OAuth primary → this model as fallback). Pulled live for the
# Hermes install, codified here 2026-06-09.
ollama_models:
  - qwen3.6:27b

# Hermes Ollama-fallback tuning (BRIZZA-51, validated live 2026-06-09):
# FLASH_ATTENTION + KV q8_0 halve the KV cache so qwen3.6:27b-64k fits
# fully on-GPU at 64K context (18 GB, 100% GPU — vs 21 GB / 6% CPU spill
# with the f16 KV default). KV q8_0 is a marginal quality tradeoff,
# deliberately scoped to this host rather than the role defaults.
ollama_extra_env:
  OLLAMA_FLASH_ATTENTION: "1"
  OLLAMA_KV_CACHE_TYPE: "q8_0"

# qwen3.6:27b-64k — Hermes's Ollama fallback model (BRIZZA-51). A per-model
# num_ctx variant because OpenAI-compat /v1 consumers can't set context
# per-request (it must live server-side), and a global 64K default would
# make every casual model load grab a huge KV cache. 64K is the 27B sweet
# spot on the 20 GiB card — KV scales linearly with context, so 128K would
# spill again. (Mechanism precedent: the Cognee-era qwen36-moe-16k build.)
ollama_modelfiles:
  - name: qwen3.6:27b-64k
    from: qwen3.6:27b
    parameters:
      num_ctx: 64000

# Long keep-alive so interactive back-and-forth doesn't pay the
# cold-load cost every prompt. Override here if a different
# pattern emerges.
ollama_keep_alive: "24h"
