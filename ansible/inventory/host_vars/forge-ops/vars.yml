---
# Connection
ansible_host: 10.10.20.20
ansible_user: joseph

# Machine identity
hostname: forge-ops
timezone: America/Detroit
locale: en_US.UTF-8

# Network
management_ip: 10.10.10.20
production_ip: 10.10.20.20
domain: bezaforge.dev

# NFS mounts
# gdrive was previously mounted out-of-band during Cognee Phase A — added
# here 2026-05-17 so it's Ansible-managed (audit drift fix).
# forge-ops-backup is new 2026-05-17 per ADR 0001 — nightly backup target.
nfs_mounts:
  - src: "10.10.10.10:/bezapool/media"
    path: "/mnt/bezapool/media"
  - src: "10.10.10.10:/bezapool/downloads"
    path: "/mnt/bezapool/downloads"
  - src: "10.10.10.10:/bezapool/gdrive"
    path: "/mnt/bezapool/gdrive"
  - src: "10.10.10.10:/bezapool/forge-ops-backup"
    path: "/mnt/bezapool/forge-ops-backup"
  # bezapool/vault RO mount REMOVED 2026-06-09 (FORGE-49): its only
  # consumer was Cognee (retired 2026-06-09); the hypervisor export
  # stanza was retired with it.

# Media directories to create under /mnt/bezapool/media
media_dirs:
  - movies
  - tv
  - music
  - photos
  - books

# Service directory
bezaforge_root: /opt/bezaforge

# Docker services deployed by the 'services' role
# (traefik, adguard, monitoring have their own roles)
# NOTE: harbor used its own offline installer (retired 2026-05-17)
# NOTE: wiki was retired 2026-05-17 (Wiki.js — ROADMAP carryover #21)
compose_services:
  - gitea
  - uptime-kuma
  - netbox
  - langfuse
  - homepage
  # Open WebUI — shared chat UI fronting Ollama (forge-ai) + Brizza/Hermes
  # (added later). Env-var service: secret in .env (open_webui_secret_key,
  # vault), non-secrets inline in the compose. FORGE-53.
  - open-webui
  # Calibre-Web-Automated — ebook library + reader. Simple service (no
  # secrets; admin is set in the UI, not env). Re-introduces ebooks to
  # BezaForge after the Kavita retirement (FORGE-16); web-upload workflow.
  - calibre-web
  # Jellyfin — media server, HW transcode via iGPU. Simple service (admin in
  # UI). Codified from a manual deploy 2026-06-27 (FORGE-67).
  - jellyfin
  # Seedbox — qBittorrent behind a Gluetun VPN kill-switch. Env-var service
  # (VPN key in .env ← vault). Codified from a manual deploy 2026-06-27 (FORGE-68).
  - seedbox
# taiga retired 2026-05-22 — see ROADMAP carryover #23 / guide 12.

# Feature flags
nfs_client: true
