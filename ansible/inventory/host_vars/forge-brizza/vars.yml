---
# Connection
ansible_host: 10.10.50.20
ansible_user: joseph

# Machine identity
hostname: forge-brizza
timezone: America/Detroit
locale: en_US.UTF-8

# Feature flags
# nfs_client: keeps the bezapool/gdrive NFS mount (LAN access to the
# Drive replica). Insync retired 2026-06-06 (ADR 0002) + purged
# 2026-06-09 (FORGE-35) — the replica is pulled by roles/gdrive-replica
# on the hypervisor now.
nfs_client: true
# Docker engine enabled 2026-05-30 (FORGE-24) — runs Brizza's Hermes Agent
# container (nousresearch/hermes-agent) per Brizza ADR 0009. Unblocks BRIZZA-51.
forge_brizza_install_docker: true

# NFS mounts (used by forge-brizza role when nfs_client is true).
# Source is forge-hypervisor's bezapool/gdrive ZFS dataset.
# bezapool/vault added 2026-06-06 (ADR 0002) — the Master-Mind vault git
# clone; RW here (export squashes to uid 1000) for vault-sync + Hermes.
nfs_mounts:
  - src: 10.10.10.10:/bezapool/gdrive
    path: /mnt/bezapool/gdrive
  # FORGE-25 (2026-06-12): nightly ~/.hermes off-VM backup target.
  # Write-only rsync destination — no git actor touches this dataset,
  # so the vaultsync-checkout-vs-NFS-reader race that killed the vault
  # mount (FORGE-49) does not apply. Export is no_root_squash so the
  # root rsync preserves uid-10000 container ownership raw.
  - src: 10.10.10.10:/bezapool/brizza-backup
    path: /mnt/bezapool/brizza-backup
# bezapool/vault NFS mount REMOVED 2026-06-09 (FORGE-49): recursive
# traversal over the mount intermittently EINVALed when a vaultsync
# checkout on the hypervisor raced the NFS client — broke Hermes vault
# grounding. Replaced by a LOCAL git clone (vault_sync_* block below);
# the hypervisor export stanza was retired with it.

# Desktop package override. Role default is ubuntu-desktop-minimal as
# the conservative pick for a generic assistant host; forge-brizza
# wants the full meta because Insync needs a complete GNOME session
# (browser for OAuth, file manager, full app menu) and the future
# Brizza Python + LangGraph runtime may want it too for any GUI
# automation tasks.
forge_brizza_desktop_package: ubuntu-desktop

# --- vault-sync: local vault clone (FORGE-49, ADR 0002 v1.3) ---
# Hermes vault grounding reads/writes a LOCAL clone — no NFS in the
# path, so the vaultsync-checkout-vs-NFS-reader race can't occur. The
# 1-min timer commits+pushes Hermes writes to Gitea and pulls laptop
# edits. Timer-only deployment: no webhook receiver, no mirror fan-out
# (the hypervisor deployment owns offsite mirrors), no NFS lease
# sysctl (not an NFS server), no /etc/hosts pins (AdGuard resolves
# git.bezaforge.dev here).
# One-time post-deploy: register
# /home/joseph/.ssh/id_ed25519_vault_sync.pub as a WRITE deploy key on
# the Gitea vault repo — the first play run fails at the clone step
# until then (expected).
vault_sync_clone_path: /home/joseph/Vaults/Master-Mind
vault_sync_user: joseph
vault_sync_create_user: false
# Brizza drop zone (BRIZZA-62, 2026-06-11): the ONE vault dir the Hermes
# container can write (nested RW bind over the RO vault mount). Hermes
# creates new files 0600/uid-10000, which joseph's git can't read — this
# makes the sync chmod g+rwX the dir (via a scoped sudoers rule) before
# every git add. See roles/vault-sync/defaults for the full rationale.
vault_sync_normalize_perms_path: /home/joseph/Vaults/Master-Mind/00-INBOX/Brizza
vault_sync_ssh_key: /home/joseph/.ssh/id_ed25519_vault_sync
vault_sync_manage_leases: false
vault_sync_manage_etc_hosts: false
vault_sync_webhook_enabled: false
vault_sync_mirror_push: false
# Uptime Kuma freshness heartbeat (FORGE-40 pattern): the push-monitor
# URL carries a per-monitor token, so it lives in vault.yml beside this
# file (ansible-vault encrypted) as vault_sync_heartbeat_url — same
# pattern as host_vars/forge-hypervisor/. Role default "" = disabled
# until vault.yml provides the real URL.
