---
# ============================================================
# group_vars/all — applies to every host in the inventory
# ============================================================

# Silences the "discovered Python interpreter" warning Ansible
# prints on every play. `auto_silent` keeps the auto-discovery
# behavior (so Python upgrades on the target host don't break
# the playbook) but suppresses the deprecation warning.
# Documented at:
# https://docs.ansible.com/ansible-core/devel/reference_appendices/interpreter_discovery.html
ansible_python_interpreter: auto_silent

# ------------------------------------------------------------
# Admin SSH sources
# ------------------------------------------------------------
# IPs allowed to SSH to EVERY host, in addition to the management
# VLAN (10.10.10.0/24, allowed separately in roles/common). This
# codifies hand-added UFW rules that existed only on forge-ops
# (drift discovered 2026-06-08, FORGE-36 session) — without them a
# fresh-UFW host (e.g. forge-ai) would lock Joseph out the moment
# the common role enables UFW.
#
# Joseph administers from his laptop:
#   - 10.10.40.99 — laptop on Home WiFi (VLAN 40)
#   - 10.10.99.99 — laptop over WireGuard (while away)
# /32 single hosts (strictest — not the whole VLAN, so other Home
# devices can't SSH). Keep both DHCP-reserved in Omada so they
# don't drift. Omada inter-VLAN ACLs already permit laptop→any-VLAN
# routing; this is the separate per-HOST (UFW) accept layer.
common_admin_ssh_sources:
  - 10.10.40.99
  - 10.10.99.99

# ------------------------------------------------------------
# Monitoring scrape sources
# ------------------------------------------------------------
# Hosts allowed to reach node_exporter (tcp/9100) on every
# common-managed host. Prometheus runs on forge-ops and scrapes from
# its VLAN-20 NIC (10.10.20.20) — NOT the mgmt VLAN — so the
# "full access from management VLAN" rule in roles/common does not
# cover it. This codifies a manual `ufw allow` that lived only on
# forge-ai and was lost 2026-06-14, which blocked the scrape and
# fired a false Grafana "forge-ai / ollama down" alert. Same drift
# class as common_admin_ssh_sources (FORGE-36).
common_monitoring_sources:
  - 10.10.20.20   # forge-ops (Prometheus) VLAN-20 scrape source
