---
# ============================================================
# forge-ops-backup-rsync role defaults
#
# Defines what to rsync from /opt/bezaforge/* → bezapool/forge-ops-backup
# and when. Per-service exclude patterns can be added below.
# ============================================================

# Sources + targets
backup_source_root: "{{ bezaforge_root | default('/opt/bezaforge') }}"
backup_dest_root: /mnt/bezapool/forge-ops-backup

# When to fire — 15 min after db-dumps. systemd OnCalendar syntax.
rsync_schedule: "*-*-* 02:45:00"

# Services to back up. Each entry rsyncs
#   {{ backup_source_root }}/<name>/  →  {{ backup_dest_root }}/<name>/data/
# Excludes are appended to a baseline (see template). Add
# `excludes` per-service to skip ephemeral subpaths.
#
# Skipped:
# - lost+found/ : ext4 metadata, not service state
# (vault/ and wikijs/ were removed as empty stubs 2026-05-17.
#  Add them back here if/when HashiCorp Vault is deployed.)
backup_services:
  - name: adguard
  - name: calibre-web
    excludes:
      # Watched drop-folder; files are moved into library/ after import.
      # config/ (app.db, settings) + library/ (metadata.db + books) → bezapool.
      - "ingest/"
  - name: gitea
  - name: grafana
  # harbor removed 2026-05-17 (retired — see ROADMAP carryover #8)
  - name: homepage
  - name: jellyfin
  # kavita removed 2026-06-20 (Kavita retired — FORGE-16)
  - name: langfuse
  - name: loki
  - name: netbox
  - name: open-webui
    # Open WebUI sqlite DB (users/chats/settings/connections) + uploads +
    # RAG vector store live under data/. FORGE-53.
  - name: outline
  - name: brizza-postgres
    # Physical copy of the data dir alongside the logical pg_dumpall
    # (db-dumps). The dump is the authoritative restore path; this
    # mirrors the outline pattern for parity.
  # cognee removed 2026-06-09 (Cognee retired — see Cognee KB doc + journal)
  - name: prometheus
    excludes:
      # The write-ahead-log is constantly mutating during scrape.
      # Skip it — TSDB will rebuild on restart.
      - "data/wal/"
  - name: seedbox
  - name: traefik
  - name: uptime-kuma
# wiki removed 2026-05-17 (Wiki.js retired — see ROADMAP carryover #21)
# taiga removed 2026-05-22 (Taiga retired — see guide 12)
# plane removed 2026-07-14 (Plane retired — migrated to OpenProject, FORGE #455)
