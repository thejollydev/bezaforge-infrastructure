---
# ============================================================
# sanoid role — ZFS snapshot policy on forge-hypervisor
#
# Manages /etc/sanoid/sanoid.conf and ensures the sanoid
# systemd timer is enabled. Idempotent — safe to re-run.
#
# Pre-existing state (2026-05-17 audit): sanoid was already
# installed and running on bezapool/gdrive only. This role
# brings that hand-managed config under Ansible control AND
# extends coverage to forge-ops-backup, downloads, media, and
# vzdump per ADR 0001.
# ============================================================

- name: Install sanoid (idempotent if already installed)
  ansible.builtin.apt:
    name: sanoid
    state: present
    update_cache: true

- name: Ensure /etc/sanoid exists
  ansible.builtin.file:
    path: /etc/sanoid
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Check for an existing pre-Ansible sanoid.conf backup
  ansible.builtin.find:
    paths: /etc/sanoid
    patterns: "sanoid.conf.pre-ansible-*"
  register: sanoid_preansible_backups

- name: Back up any hand-managed sanoid.conf on first deploy
  ansible.builtin.copy:
    src: /etc/sanoid/sanoid.conf
    dest: "/etc/sanoid/sanoid.conf.pre-ansible-{{ ansible_facts['date_time']['iso8601_basic_short'] }}"
    remote_src: true
    force: false
    mode: preserve
  failed_when: false
  # Only on the GENUINE first deploy — guarded by the find above. The
  # timestamped dest is a different filename every run, so copy's own
  # force:false can't make it idempotent (the new name never exists yet)
  # → it re-backed-up + reported `changed` on every run. The guard makes
  # it truly one-time. Best-effort safety net against clobbering a hand edit.
  when: sanoid_preansible_backups.matched == 0

- name: Deploy sanoid.conf from template
  ansible.builtin.template:
    src: sanoid.conf.j2
    dest: /etc/sanoid/sanoid.conf
    owner: root
    group: root
    mode: '0644'
  notify: run sanoid

# ------------------------------------------------------------
# syncoid cross-pool replication (FORGE-85 / ADR 0003)
# syncoid ships in the sanoid package installed above.
# ------------------------------------------------------------
- name: Deploy bezaforge-syncoid.sh
  ansible.builtin.template:
    src: bezaforge-syncoid.sh.j2
    dest: /usr/local/bin/bezaforge-syncoid.sh
    owner: root
    group: root
    mode: '0755'

- name: Deploy syncoid systemd unit + timer
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - { src: 'bezaforge-syncoid.service.j2', dest: 'bezaforge-syncoid.service' }
    - { src: 'bezaforge-syncoid.timer.j2', dest: 'bezaforge-syncoid.timer' }
  notify: reload systemd (sanoid)

- name: Flush handlers (reload systemd)
  ansible.builtin.meta: flush_handlers

# Skipped in check mode: a first --check run only SIMULATES writing the
# unit file, so systemd can't find it and this task would false-fail.
# The unit diff above already shows what a real run deploys.
- name: Enable + start syncoid timer
  ansible.builtin.systemd:
    name: bezaforge-syncoid.timer
    enabled: true
    state: started
  when: not ansible_check_mode

- name: Ensure sanoid.timer is enabled and running
  ansible.builtin.systemd:
    name: sanoid.timer
    enabled: true
    state: started
