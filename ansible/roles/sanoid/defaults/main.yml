---
# ============================================================
# sanoid role defaults
#
# Sanoid takes ZFS snapshots on a schedule. Snapshots are
# block-level and instant, so the retention policy controls
# both disk usage and recovery granularity.
#
# Templates define retention. Datasets reference a template.
# Edits should happen here — the rendered sanoid.conf is
# regenerated on every Ansible run.
# ============================================================

# ------------------------------------------------------------
# Retention templates
#
# Each template defines how many snapshots of each cadence
# to keep. Sanoid runs every 15 min via systemd timer and
# decides whether to take/prune snapshots based on these.
#
# Picking retention numbers:
# - hourly: short-term oops protection ("I deleted that file")
# - daily:  one-day-ago snapshots, sized by working-set churn
# - weekly: drift detection / config rollback over weeks
# - monthly: long-tail recovery (compliance, "what did X look
#           like before this big refactor")
#
# For the four BezaForge datasets we have different needs:
# - gdrive: hottest path (vault edits constantly). Hourly
#           granularity is genuinely useful.
# - forge-ops-backup: derivative copy refreshed nightly. No
#           value in hourly. 7 dailies plus weeklies/monthlies.
# - downloads: ephemeral (qBittorrent in-flight). Lightweight.
# - media: large + slow-churn. Don't need lots of snapshots.
# - vzdump: NOT snapshotted — it IS the VM backups (snapshotting backups
#           pins pruned copies; see FORGE-44 note below).
# ------------------------------------------------------------
sanoid_templates:
  gdrive:
    hourly: 24
    daily: 14
    weekly: 8
    monthly: 12
  forge_ops_backup:
    hourly: 0
    daily: 7
    weekly: 4
    monthly: 6
  # brizza_backup: same posture as forge_ops_backup — a derivative copy
  # refreshed nightly (03:45 rsync of forge-brizza's ~/.hermes, FORGE-25).
  # NOT the vzdump trap: the source prunes exports on a 14-day window, so
  # snapshots here EXTEND history past the source retention (the point),
  # pinning only small dailies — not multi-GB pruned backup archives.
  brizza_backup:
    hourly: 0
    daily: 7
    weekly: 4
    monthly: 6
  # forge-erp ERPNext bench backups (FORGE-60/61/62). Financial-grade: extends
  # history well past the 14-day local prune on forge-erp. `yearly` is honoured
  # by the conditional in sanoid.conf.j2 (the other templates simply omit it).
  forge_erp_backup:
    hourly: 0
    daily: 14
    weekly: 8
    monthly: 12
    yearly: 3
  downloads:
    hourly: 0
    daily: 7
    weekly: 0
    monthly: 0
  media:
    hourly: 0
    daily: 4
    weekly: 4
    monthly: 3
  # vzdump template REMOVED 2026-06-08 (FORGE-44): bezapool/vzdump is no longer
  # snapshotted — it already holds point-in-time VM backups, and snapshotting a
  # backup dataset pinned every pruned-out daily backup (1.44 TB dead weight;
  # one stale weekly snapshot alone held 619 GB). See the datasets list below.
  # vault: the Master-Mind git clone (ADR 0002). Same posture as
  # gdrive had — hottest dataset, hourly granularity genuinely useful.
  # Git history overlaps this protection but snapshots also cover
  # untracked/ignored files and a corrupted-clone scenario.
  vault:
    hourly: 24
    daily: 14
    weekly: 8
    monthly: 12
  # sharepool/files documents share (ADR 0003 Bucket B). Moderate doc
  # churn — no hourly; generous dailies/weeklies as the first safety
  # layer on a single-disk pool.
  share:
    hourly: 0
    daily: 14
    weekly: 8
    monthly: 6

# ------------------------------------------------------------
# Datasets covered by sanoid
#
# Each entry binds a ZFS dataset to a retention template.
# Order matters only for readability of the rendered conf.
#
# recursive: "no" means: snapshot this dataset only, not
# children. If a child dataset gets its own row, it can use
# a different template. (We're not using recursion today.)
# ------------------------------------------------------------
sanoid_datasets:
  - dataset: "bezapool/gdrive"
    template: "gdrive"
    recursive: "no"

  - dataset: "bezapool/forge-ops-backup"
    template: "forge_ops_backup"
    recursive: "no"

  # forge-brizza ~/.hermes nightly mirror (FORGE-25, 2026-06-12).
  - dataset: "bezapool/brizza-backup"
    template: "brizza_backup"
    recursive: "no"

  # forge-erp ERPNext bench backups (FORGE-60/61/62, 2026-06-17). Small logical
  # dumps pushed nightly from forge-erp — safe to snapshot (NOT the vzdump trap;
  # snapshots here EXTEND financial history past forge-erp's 14-day local prune).
  - dataset: "bezapool/forge-erp-backup"
    template: "forge_erp_backup"
    recursive: "no"

  - dataset: "bezapool/downloads"
    template: "downloads"
    recursive: "no"

  - dataset: "bezapool/media"
    template: "media"
    recursive: "no"

  # bezapool/vzdump intentionally NOT snapshotted (removed 2026-06-08, FORGE-44):
  # it's a backup dataset (Proxmox VM images). Snapshotting backups pinned every
  # daily backup the vzdump job pruned → 1.44 TB reclaimed when the old snapshots
  # were destroyed. ADR 0001 correction: don't back up backups. Retention for
  # vzdump = the backup job's own keep-daily=7.

  - dataset: "bezapool/vault"
    template: "vault"
    recursive: "no"

  # sharepool/files — documents share (ADR 0003 Bucket B, 2026-06-28).
  # Single-disk pool (no redundancy) → snapshots are the first safety
  # layer. The nested GoogleDrive/ is a FUSE mount (not ZFS), invisible
  # to snapshots — only the real document files are captured (Drive's
  # own master + trash cover the mounted side). Offsite (zfs send →
  # bezapool + restic) is a follow-up.
  - dataset: "sharepool/files"
    template: "share"
    recursive: "no"
