---
# ============================================================
# forge-brizza role — assistant host setup
#
# Phase 1a: base packages, locale, timezone, systemd-timesyncd,
#           GNOME, GDM auto-login, prometheus-node-exporter
# Phase 1b: nfs-common + /mnt/bezapool/gdrive mount, Insync
#           desktop client (apt repo). Gated on host vars
#           (nfs_client + forge_brizza_install_insync) so this
#           role can run incrementally as Phase 1 progresses.
#
# Companion docs (Master-Mind vault):
#   - 05_Projects/brizza/ROADMAP.md
#   - 05_Projects/brizza/phases/Phase-1-Deploy.md
#   - 05_Projects/bezaforge-infrastructure/phases/2-automation/
#       08-memory-system-role.md
#         → "Phase A continuation on forge-brizza"
# ============================================================

# ------------------------------------------------------------
# Base packages
# ------------------------------------------------------------
- name: Install base system packages
  ansible.builtin.apt:
    name: "{{ forge_brizza_base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

# ------------------------------------------------------------
# Locale + timezone
# ------------------------------------------------------------
- name: Generate locale
  community.general.locale_gen:
    name: "{{ locale }}"
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

# ------------------------------------------------------------
# Time sync
# ------------------------------------------------------------
# systemd-timesyncd is already active+synchronized from cloud-init.
# Timezone is set above via community.general.timezone (timedatectl)
# and is daemon-agnostic. No daemon swap needed.

# ------------------------------------------------------------
# Unattended security updates
# ------------------------------------------------------------
# Cloud-init enables this already, but make it idempotent.
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Enable unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: started
    enabled: true

# ------------------------------------------------------------
# Prometheus node_exporter
# ------------------------------------------------------------
# Ubuntu's prometheus-node-exporter package; service unit name
# matches the package (binds 0.0.0.0:9100 by default).
# Reachable from forge-ops over the AI VLAN once monitoring
# scrape config is updated (separate task in BezaForge repo).
- name: Install prometheus-node-exporter
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
  when: forge_brizza_node_exporter_enabled | bool

- name: Enable and start prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true
  when: forge_brizza_node_exporter_enabled | bool
  # In --check, apt installs are simulated — the unit file isn't on
  # disk yet, so this task's lookup fails. Real runs do the install
  # first and find it. Ignore only in check mode.
  ignore_errors: "{{ ansible_check_mode }}"

# ------------------------------------------------------------
# GNOME desktop
# ------------------------------------------------------------
# ubuntu-desktop-minimal is large (~1.5 GB) but the smallest
# meta that gives a working GNOME session GDM can drive and
# Insync/NoMachine can attach to. After install, default boot
# target switches to graphical.target — no reboot required for
# the play to continue, but a reboot is recommended after the
# full role completes (NoMachine attaches cleaner with a fresh
# session manager).
- name: Install GNOME desktop ({{ forge_brizza_desktop_package }})
  ansible.builtin.apt:
    name: "{{ forge_brizza_desktop_package }}"
    state: present
    install_recommends: true

- name: Get current systemd default target
  ansible.builtin.command: systemctl get-default
  register: forge_brizza_current_default
  changed_when: false
  check_mode: false

- name: Set graphical default boot target
  ansible.builtin.command: systemctl set-default graphical.target
  when: forge_brizza_current_default.stdout | trim != "graphical.target"
  changed_when: true

# ------------------------------------------------------------
# GDM auto-login
# ------------------------------------------------------------
# Required so that the GNOME session running Insync auto-starts
# on boot without anyone logging in via RDP first. gnome-remote-desktop's
# user-mode service then forwards that running session to RDP clients.
# Threat model note: anyone with console access lands on a logged-in
# joseph session. Acceptable for this private VLAN VM.
- name: Configure GDM auto-login for {{ forge_brizza_gdm_autologin_user }}
  ansible.builtin.copy:
    dest: /etc/gdm3/custom.conf
    mode: '0644'
    content: |
      # Managed by Ansible (forge-brizza role)
      [daemon]
      AutomaticLoginEnable=true
      AutomaticLogin={{ forge_brizza_gdm_autologin_user }}

      [security]

      [xdmcp]

      [chooser]

      [debug]

# ------------------------------------------------------------
# Remote desktop access
# ------------------------------------------------------------
# Joseph reaches forge-brizza's GNOME session via the Proxmox web Console
# (noVNC over the VM's vga: std framebuffer). That's a Proxmox-side feature
# enabled by the VGA device in Terraform — no software needed inside the VM.
# Decision rationale: gnome-remote-desktop user-mode has a known upstream
# bug (GDM #835) where GDM autologin skips PAM keyring unlock, breaking
# `grdctl set-credentials`; GRD system-headless mode refuses concurrent
# same-user sessions (incompatible with our autologin-for-Insync pattern);
# x11vnc/TigerVNC don't support Wayland. Proxmox web Console sidesteps all
# of these because it operates on the QEMU framebuffer below the OS, and
# Joseph only needs occasional GUI access (Insync OAuth, occasional
# browser prompts) — not a daily-driver remote desktop.

# ------------------------------------------------------------
# NFS client (Phase 1b) — tuned for metadata-heavy workloads
# ------------------------------------------------------------
# Gated on the existing nfs_client host var. nfs_mounts is a
# list of {src, path[, opts]} dicts; first entry will be the
# bezapool gdrive mount once host_vars is updated for Phase 1b.
#
# cachefilesd installs the userspace daemon that backs the `fsc`
# mount option — without it `fsc` is a no-op. See defaults/main.yml
# `forge_brizza_nfs_default_opts` for tuning rationale.
- name: Install NFS client + fscache daemon
  ansible.builtin.apt:
    name:
      - nfs-common
      - cachefilesd
    state: present
  when: nfs_client | bool

- name: Enable cachefilesd
  ansible.builtin.systemd:
    name: cachefilesd
    enabled: true
    state: started
  when: nfs_client | bool

- name: Create NFS mount points
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop: "{{ nfs_mounts | default([]) }}"
  when: nfs_client | bool

- name: Mount NFS shares and add to fstab
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: nfs
    opts: "{{ item.opts | default(forge_brizza_nfs_default_opts) }}"
    state: mounted
  loop: "{{ nfs_mounts | default([]) }}"
  when: nfs_client | bool

# ------------------------------------------------------------
# Insync — desktop client via official apt repo (Phase 1b)
# ------------------------------------------------------------
# Gated on forge_brizza_install_insync. Sign-in + sync-folder
# selection still happens manually through the GNOME GUI over
# NoMachine — see Brizza Phase 1b checklist.
- name: Remove legacy insynchq.gpg keyring file if present (pre-2026-05 path)
  ansible.builtin.file:
    path: /etc/apt/trusted.gpg.d/insynchq.gpg
    state: absent
  when: forge_brizza_install_insync | bool

- name: Fetch Insync GPG key (ASCII-armored from upstream)
  ansible.builtin.get_url:
    url: "{{ forge_brizza_insync_apt_key_url }}"
    dest: /tmp/insync-key.asc
    mode: '0644'
  when: forge_brizza_install_insync | bool

- name: Dearmor Insync key into apt trusted keyring
  ansible.builtin.command:
    cmd: "gpg --yes --dearmor -o {{ forge_brizza_insync_keyring_path }} /tmp/insync-key.asc"
    creates: "{{ forge_brizza_insync_keyring_path }}"
  when: forge_brizza_install_insync | bool

- name: Add Insync apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/insync.list
    content: "{{ forge_brizza_insync_apt_repo }}\n"
    mode: '0644'
  when: forge_brizza_install_insync | bool
  register: forge_brizza_insync_repo

- name: Refresh apt cache so Insync repo is visible
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 60
  when: forge_brizza_install_insync | bool

- name: Install Insync packages
  ansible.builtin.apt:
    name: "{{ forge_brizza_insync_packages }}"
    state: present
  when: forge_brizza_install_insync | bool
