---
# ============================================================
# forge-brizza role — assistant host setup
#
# Phase 1a: base packages, locale, timezone, systemd-timesyncd,
#           GNOME, GDM auto-login, prometheus-node-exporter
# Phase 1b: nfs-common + /mnt/bezapool/gdrive mount (gated on
#           nfs_client). Insync was Phase 1b's other half —
#           retired by ADR 0002 (2026-06-06) and purged from
#           this role 2026-06-09 (FORGE-35); the Drive replica
#           is now pulled by roles/gdrive-replica on the
#           hypervisor.
# Hermes bridge (FORGE-24): Docker CE engine for the Hermes Agent
#           container (Brizza ADR 0009). Gated on
#           forge_brizza_install_docker.
# Hermes insurance (BRIZZA-58): nightly sessions-JSONL + quick-state
#           exports via systemd timer. Gated on the docker flag +
#           forge_brizza_hermes_insurance_enabled.
#
# Companion docs (Master-Mind vault):
#   - 05_Projects/brizza/ROADMAP.md
#   - 05_Projects/brizza/phases/Phase-1-Deploy.md
#   - 05_Projects/bezaforge-infrastructure/phases/2-automation/
#       08-memory-system-role.md
#         → "Phase A continuation on forge-brizza"
# ============================================================

# ------------------------------------------------------------
# Base packages
# ------------------------------------------------------------
- name: Install base system packages
  ansible.builtin.apt:
    name: "{{ forge_brizza_base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

# ------------------------------------------------------------
# Locale + timezone
# ------------------------------------------------------------
- name: Generate locale
  community.general.locale_gen:
    name: "{{ locale }}"
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

# ------------------------------------------------------------
# Time sync
# ------------------------------------------------------------
# systemd-timesyncd is already active+synchronized from cloud-init.
# Timezone is set above via community.general.timezone (timedatectl)
# and is daemon-agnostic. No daemon swap needed.

# ------------------------------------------------------------
# Unattended security updates
# ------------------------------------------------------------
# Cloud-init enables this already, but make it idempotent.
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Enable unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: started
    enabled: true

# ------------------------------------------------------------
# Prometheus node_exporter
# ------------------------------------------------------------
# Ubuntu's prometheus-node-exporter package; service unit name
# matches the package (binds 0.0.0.0:9100 by default).
# Reachable from forge-ops over the AI VLAN once monitoring
# scrape config is updated (separate task in BezaForge repo).
- name: Install prometheus-node-exporter
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
  when: forge_brizza_node_exporter_enabled | bool

- name: Enable and start prometheus-node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true
  when: forge_brizza_node_exporter_enabled | bool
  # In --check, apt installs are simulated — the unit file isn't on
  # disk yet, so this task's lookup fails. Real runs do the install
  # first and find it. Ignore only in check mode.
  ignore_errors: "{{ ansible_check_mode }}"

# ------------------------------------------------------------
# GNOME desktop
# ------------------------------------------------------------
# ubuntu-desktop-minimal is large (~1.5 GB) but the smallest
# meta that gives a working GNOME session GDM can drive for GUI
# access (Proxmox console; future GUI automation). After install, default boot
# target switches to graphical.target — no reboot required for
# the play to continue, but a reboot is recommended after the
# full role completes (NoMachine attaches cleaner with a fresh
# session manager).
- name: Install GNOME desktop ({{ forge_brizza_desktop_package }})
  ansible.builtin.apt:
    name: "{{ forge_brizza_desktop_package }}"
    state: present
    install_recommends: true

- name: Get current systemd default target
  ansible.builtin.command: systemctl get-default
  register: forge_brizza_current_default
  changed_when: false
  check_mode: false

- name: Set graphical default boot target
  ansible.builtin.command: systemctl set-default graphical.target
  when: forge_brizza_current_default.stdout | trim != "graphical.target"
  changed_when: true

# ------------------------------------------------------------
# GDM auto-login
# ------------------------------------------------------------
# Keeps a logged-in GNOME session available on boot without anyone
# logging in first (originally for Insync — retired 2026-06-09,
# FORGE-35; kept for Proxmox-console access + future GUI automation).
# Threat model note: anyone with console access lands on a logged-in
# joseph session. Acceptable for this private VLAN VM.
- name: Configure GDM auto-login for {{ forge_brizza_gdm_autologin_user }}
  ansible.builtin.copy:
    dest: /etc/gdm3/custom.conf
    mode: '0644'
    content: |
      # Managed by Ansible (forge-brizza role)
      [daemon]
      AutomaticLoginEnable=true
      AutomaticLogin={{ forge_brizza_gdm_autologin_user }}

      [security]

      [xdmcp]

      [chooser]

      [debug]

# ------------------------------------------------------------
# Remote desktop access
# ------------------------------------------------------------
# Joseph reaches forge-brizza's GNOME session via the Proxmox web Console
# (noVNC over the VM's vga: std framebuffer). That's a Proxmox-side feature
# enabled by the VGA device in Terraform — no software needed inside the VM.
# Decision rationale: gnome-remote-desktop user-mode has a known upstream
# bug (GDM #835) where GDM autologin skips PAM keyring unlock, breaking
# `grdctl set-credentials`; GRD system-headless mode refuses concurrent
# same-user sessions (incompatible with our autologin pattern);
# x11vnc/TigerVNC don't support Wayland. Proxmox web Console sidesteps all
# of these because it operates on the QEMU framebuffer below the OS, and
# Joseph only needs occasional GUI access (occasional browser
# prompts) — not a daily-driver remote desktop.

# ------------------------------------------------------------
# NFS client (Phase 1b) — tuned for metadata-heavy workloads
# ------------------------------------------------------------
# Gated on the existing nfs_client host var. nfs_mounts is a
# list of {src, path[, opts]} dicts; first entry will be the
# bezapool gdrive mount once host_vars is updated for Phase 1b.
#
# cachefilesd installs the userspace daemon that backs the `fsc`
# mount option — without it `fsc` is a no-op. See defaults/main.yml
# `forge_brizza_nfs_default_opts` for tuning rationale.
- name: Install NFS client + fscache daemon
  ansible.builtin.apt:
    name:
      - nfs-common
      - cachefilesd
    state: present
  when: nfs_client | bool

- name: Enable cachefilesd
  ansible.builtin.systemd:
    name: cachefilesd
    enabled: true
    state: started
  when: nfs_client | bool

- name: Create NFS mount points
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop: "{{ nfs_mounts | default([]) }}"
  when: nfs_client | bool

- name: Mount NFS shares and add to fstab
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: nfs
    opts: "{{ item.opts | default(forge_brizza_nfs_default_opts) }}"
    state: mounted
  loop: "{{ nfs_mounts | default([]) }}"
  when: nfs_client | bool

# (Insync install tasks removed 2026-06-09 — FORGE-35 Phase 4/5.
# Live packages + apt repo + keyring purged by hand the same day;
# the Drive replica now runs as roles/gdrive-replica on the
# hypervisor.)

# ------------------------------------------------------------
# Docker engine (Hermes bridge — FORGE-24)
# ------------------------------------------------------------
# Docker CE from Docker's official apt repo so forge-brizza can run
# Brizza's Hermes Agent container (nousresearch/hermes-agent:latest) per
# Brizza ADR 0009. Engine + compose plugin only — no bezaforge-net or
# /opt/bezaforge service scaffolding (that's the forge-ops `docker` role).
# The repo path follows the host's distro ({{ ansible_facts['distribution'] | lower }})
# rather than the debian path the forge-ops role hardcodes, so it resolves
# correctly on this Ubuntu host. Gated on forge_brizza_install_docker.
- name: Create apt keyrings directory (Docker)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: forge_brizza_install_docker | bool

- name: Add Docker GPG key
  ansible.builtin.shell:
    cmd: "curl -fsSL https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg"
    creates: /etc/apt/keyrings/docker.gpg
  when: forge_brizza_install_docker | bool

# Skipped in --check: the GPG-key shell task above doesn't actually create
# the file in check mode, so this perms task would fail on an absent file.
# Real runs create it first, then this sets 0644.
- name: Set Docker GPG key permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'
  when: forge_brizza_install_docker | bool and not ansible_check_mode

- name: Add Docker repository
  ansible.builtin.deb822_repository:
    name: docker
    uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: amd64
    signed_by: /etc/apt/keyrings/docker.gpg
    state: present
    enabled: true
  when: forge_brizza_install_docker | bool

# In --check the Docker apt repo isn't really added (deb822 only simulates),
# so these packages aren't visible and a check run would hard-fail finding
# them. Same rationale as the node-exporter enable task above — ignore in
# check mode only; the real apply adds the repo first, then installs.
- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ forge_brizza_docker_packages }}"
    state: present
    update_cache: true
  when: forge_brizza_install_docker | bool
  ignore_errors: "{{ ansible_check_mode }}"

# append: true ADDS docker without clobbering joseph's existing groups
# (sudo, etc.) — dropping append is a classic footgun.
# Check-mode: the docker group doesn't exist until the package is installed,
# so the user module would fail in a dry run — ignore in check only.
- name: Add {{ forge_brizza_docker_user }} to docker group
  ansible.builtin.user:
    name: "{{ forge_brizza_docker_user }}"
    groups: docker
    append: true
  when: forge_brizza_install_docker | bool
  ignore_errors: "{{ ansible_check_mode }}"

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  when: forge_brizza_install_docker | bool
  # In --check the package isn't installed yet, so the unit file isn't on
  # disk and this lookup fails. Real runs install first. Ignore in check only.
  ignore_errors: "{{ ansible_check_mode }}"

# ------------------------------------------------------------
# Hermes insurance exports (BRIZZA-58) — see defaults for rationale
# ------------------------------------------------------------
- name: Deploy hermes-insurance export script
  ansible.builtin.template:
    src: hermes-insurance.sh.j2
    dest: /usr/local/bin/hermes-insurance.sh
    mode: "0755"
  tags: hermes-insurance
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_insurance_enabled | bool

- name: Deploy hermes-insurance systemd units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - hermes-insurance.service
    - hermes-insurance.timer
  tags: hermes-insurance
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_insurance_enabled | bool

- name: Enable and start the hermes-insurance timer
  ansible.builtin.systemd:
    name: hermes-insurance.timer
    enabled: true
    state: started
    daemon_reload: true
  tags: hermes-insurance
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_insurance_enabled | bool

# ------------------------------------------------------------
# Hermes off-VM backup (FORGE-25) — see defaults for rationale
# ------------------------------------------------------------
- name: Generate the hermes-backup SSH keypair (root → hypervisor push)
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -N "" -C "hermes-backup@forge-brizza" -f {{ forge_brizza_hermes_backup_ssh_key }}
    creates: "{{ forge_brizza_hermes_backup_ssh_key }}"
  tags: hermes-backup
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_backup_enabled | bool

- name: Read the hermes-backup public key
  ansible.builtin.slurp:
    src: "{{ forge_brizza_hermes_backup_ssh_key }}.pub"
  register: _hermes_backup_pubkey
  tags: hermes-backup
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_backup_enabled | bool

- name: Show the authorized_keys line to register on forge-hypervisor (ONE-TIME)
  ansible.builtin.debug:
    msg: >-
      ONE-TIME on forge-hypervisor /root/.ssh/authorized_keys:
      from="10.10.50.20",no-pty,no-agent-forwarding,no-port-forwarding,no-X11-forwarding
      {{ _hermes_backup_pubkey.content | b64decode | trim }}
  tags: hermes-backup
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_backup_enabled | bool

- name: Deploy hermes-backup-rsync script
  ansible.builtin.template:
    src: hermes-backup-rsync.sh.j2
    dest: /usr/local/bin/hermes-backup-rsync.sh
    mode: "0755"
  tags: hermes-backup
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_backup_enabled | bool

- name: Deploy hermes-backup-rsync systemd units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - hermes-backup-rsync.service
    - hermes-backup-rsync.timer
  tags: hermes-backup
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_backup_enabled | bool

- name: Enable and start the hermes-backup-rsync timer
  ansible.builtin.systemd:
    name: hermes-backup-rsync.timer
    enabled: true
    state: started
    daemon_reload: true
  tags: hermes-backup
  when: forge_brizza_install_docker | bool and forge_brizza_hermes_backup_enabled | bool
