---
# ============================================================
# forge-brizza role defaults
# ============================================================
# Override in inventory/host_vars/forge-brizza.yml when needed.

# --- Apt baseline ---
forge_brizza_base_packages:
  - curl
  - wget
  - git
  - build-essential
  - jq
  - htop
  - btop
  - tree
  - vim
  - nano
  - unzip
  - zip
  - ca-certificates
  - gnupg

# --- Time sync ---
# Cloud-init's systemd-timesyncd is already active and synchronized
# on forge-brizza; chrony was in the roadmap but offers no concrete
# advantage here. Timezone change still happens via community.general.timezone
# (timedatectl under the hood, daemon-agnostic).

# --- Desktop ---
# ubuntu-desktop-minimal: real GNOME without the LibreOffice/Firefox/Thunderbird payload.
forge_brizza_desktop_package: ubuntu-desktop-minimal
forge_brizza_gdm_autologin_user: joseph

# --- Prometheus node_exporter ---
forge_brizza_node_exporter_enabled: true

# --- NFS client tuning (Phase 1b) ---
# Default mount options for entries in the host_vars `nfs_mounts` list.
# A per-mount `opts:` key in nfs_mounts overrides this default.
#
# Tuning rationale (2026-05-15): forge-brizza's Insync verify pass against
# bezapool/gdrive (millions of small files in __pycache__, .git/objects,
# typeshed stubs, etc.) was metadata-bound — Insync's RSS climbed to ~14.8 GB
# three times in five days and was OOM-killed each time on the 15 GiB VM.
# These options tune the NFS client to amortize per-RPC latency and cache
# repeat reads locally; cachefilesd backs the `fsc` option.
#
#   nconnect=8      — 8 parallel TCP connections to the NFS server
#   actimeo=600     — cache attribute lookups (stat/getattr) for 10 min
#   fsc             — enable local on-disk cache (requires cachefilesd)
#   rsize/wsize=1M  — 1 MB read/write chunks (NFSv4.2 typically negotiates
#                     this anyway; explicit is safer)
forge_brizza_nfs_default_opts: "defaults,_netdev,nofail,noatime,nconnect=8,actimeo=600,fsc,rsize=1048576,wsize=1048576"

# --- Insync: RETIRED ---
# Insync (the Phase 1b Drive sync client) was retired by ADR 0002
# (2026-06-06) and purged from this role 2026-06-09 (FORGE-35). The
# Drive replica is now a one-way rclone pull on the hypervisor
# (roles/gdrive-replica). GNOME + GDM autologin stay (Proxmox-console
# GUI access + future automation). The NFS tuning above remains —
# its rationale (metadata-heavy bulk workloads) outlives Insync.

# --- Docker engine (Hermes bridge — FORGE-24) ---
# Docker CE from Docker's official apt repo, so forge-brizza can run
# Brizza's Hermes Agent container (nousresearch/hermes-agent:latest) per
# Brizza ADR 0009. Engine + compose plugin ONLY — no bezaforge-net or
# /opt/bezaforge service-dir scaffolding (that's the forge-ops `docker`
# role's job; forge-brizza is a standalone single-container host). The
# repo path follows the host's own distro (ubuntu here) rather than the
# debian path the forge-ops role hardcodes. Flip the flag in host_vars.
forge_brizza_install_docker: false
forge_brizza_docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
forge_brizza_docker_user: joseph
