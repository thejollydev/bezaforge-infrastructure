# Plane self-hosted compose, vendored from
#   https://github.com/makeplane/plane/blob/v1.3.1/deployments/cli/community/docker-compose.yml
#
# Local modifications vs upstream:
#   1. All named volumes converted to bind mounts under ./   (so
#      forge-ops-backup-rsync covers /opt/bezaforge/plane/* nightly).
#   2. proxy: stripped host port-bindings (Traefik handles 80/443);
#      added bezaforge-net + Traefik labels; routes plane.bezaforge.dev
#      → proxy:80.
#   3. All other services attached to default `plane-internal` network
#      so the proxy can reach them while Traefik talks only to proxy.
#
# Re-vendor procedure: bump plane_release in defaults/main.yml,
# diff this file against the new upstream tag, port relevant
# upstream changes here, keep the 3 mods above intact.

x-db-env: &db-env
  PGHOST: ${PGHOST:-plane-db}
  PGDATABASE: ${PGDATABASE:-plane}
  POSTGRES_USER: ${POSTGRES_USER:-plane}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-plane}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  PGDATA: ${PGDATA:-/var/lib/postgresql/data}

x-redis-env: &redis-env
  REDIS_HOST: ${REDIS_HOST:-plane-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_URL: ${REDIS_URL:-redis://plane-redis:6379/}

x-minio-env: &minio-env
  MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
  MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}

x-aws-s3-env: &aws-s3-env
  AWS_REGION: ${AWS_REGION:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://plane-minio:9000}
  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}

x-proxy-env: &proxy-env
  APP_DOMAIN: ${APP_DOMAIN}
  FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
  CERT_EMAIL: ${CERT_EMAIL:-}
  CERT_ACME_CA: ${CERT_ACME_CA:-}
  CERT_ACME_DNS: ${CERT_ACME_DNS:-}
  LISTEN_HTTP_PORT: ${LISTEN_HTTP_PORT:-80}
  LISTEN_HTTPS_PORT: ${LISTEN_HTTPS_PORT:-443}
  BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
  SITE_ADDRESS: ${SITE_ADDRESS:-:80}

x-mq-env: &mq-env
  RABBITMQ_HOST: ${RABBITMQ_HOST:-plane-mq}
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-plane}
  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
  RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-plane}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-plane}

x-live-env: &live-env
  API_BASE_URL: ${API_BASE_URL:-http://api:8000}
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}

x-app-env: &app-env
  WEB_URL: ${WEB_URL}
  DEBUG: ${DEBUG:-0}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  GUNICORN_WORKERS: 1
  USE_MINIO: ${USE_MINIO:-1}
  DATABASE_URL: ${DATABASE_URL:-postgresql://plane:${POSTGRES_PASSWORD}@plane-db/plane}
  SECRET_KEY: ${SECRET_KEY}
  AMQP_URL: ${AMQP_URL:-amqp://plane:${RABBITMQ_PASSWORD}@plane-mq:5672/plane}
  API_KEY_RATE_LIMIT: ${API_KEY_RATE_LIMIT:-60/minute}
  MINIO_ENDPOINT_SSL: ${MINIO_ENDPOINT_SSL:-0}
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}
  WEBHOOK_ALLOWED_IPS: ${WEBHOOK_ALLOWED_IPS:-}
  WEBHOOK_ALLOWED_HOSTS: ${WEBHOOK_ALLOWED_HOSTS:-}

networks:
  plane-internal:
  bezaforge-net:
    external: true

services:
  web:
    image: makeplane/plane-frontend:${APP_RELEASE}
    restart: unless-stopped
    networks: [plane-internal]
    depends_on:
      - api
      - worker

  space:
    image: makeplane/plane-space:${APP_RELEASE}
    restart: unless-stopped
    networks: [plane-internal]
    depends_on:
      - api
      - worker
      - web

  admin:
    image: makeplane/plane-admin:${APP_RELEASE}
    restart: unless-stopped
    networks: [plane-internal]
    depends_on:
      - api
      - web

  live:
    image: makeplane/plane-live:${APP_RELEASE}
    restart: unless-stopped
    environment:
      <<: [*live-env, *redis-env]
    networks: [plane-internal]
    depends_on:
      - api
      - web

  api:
    image: makeplane/plane-backend:${APP_RELEASE}
    restart: unless-stopped
    command: ./bin/docker-entrypoint-api.sh
    volumes:
      - ./logs/api:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    networks: [plane-internal]
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq

  worker:
    image: makeplane/plane-backend:${APP_RELEASE}
    restart: unless-stopped
    command: ./bin/docker-entrypoint-worker.sh
    volumes:
      - ./logs/worker:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    networks: [plane-internal]
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq

  beat-worker:
    image: makeplane/plane-backend:${APP_RELEASE}
    restart: unless-stopped
    command: ./bin/docker-entrypoint-beat.sh
    volumes:
      - ./logs/beat-worker:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    networks: [plane-internal]
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq

  migrator:
    image: makeplane/plane-backend:${APP_RELEASE}
    restart: on-failure
    command: ./bin/docker-entrypoint-migrator.sh
    volumes:
      - ./logs/migrator:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    networks: [plane-internal]
    depends_on:
      - plane-db
      - plane-redis

  plane-db:
    image: postgres:15.7-alpine
    restart: unless-stopped
    command: postgres -c 'max_connections=1000'
    environment:
      <<: *db-env
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks: [plane-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plane"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    restart: unless-stopped
    volumes:
      - ./redis:/data
    networks: [plane-internal]

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    restart: unless-stopped
    environment:
      <<: *mq-env
    volumes:
      - ./rabbitmq:/var/lib/rabbitmq
    networks: [plane-internal]

  plane-minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /export --console-address ":9090"
    environment:
      <<: *minio-env
    volumes:
      - ./minio:/export
    networks: [plane-internal]

  proxy:
    image: makeplane/plane-proxy:${APP_RELEASE}
    container_name: plane-proxy
    restart: unless-stopped
    environment:
      <<: *proxy-env
    volumes:
      - ./proxy/config:/config
      - ./proxy/data:/data
    networks:
      - plane-internal
      - bezaforge-net
    depends_on:
      - web
      - api
      - space
      - admin
      - live
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=bezaforge-net"
      - "traefik.http.routers.plane.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.plane.entrypoints=websecure"
      - "traefik.http.routers.plane.tls.certresolver=letsencrypt"
      - "traefik.http.services.plane.loadbalancer.server.port=80"
