networks:
  bezaforge-net:
    external: true

services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "10.10.20.20:3100:3100"
    volumes:
      - /opt/bezaforge/loki/config.yml:/etc/loki/config.yml:ro
      - /opt/bezaforge/loki/data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - bezaforge-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    user: root
    volumes:
      - /opt/bezaforge/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - bezaforge-net
