---
# ============================================================
# openproject role defaults — OpenProject Community (GPLv3)
#
# The live work tracker at pm.bezaforge.dev. Replaced Plane
# 2026-07 (Plane retired, FORGE #455) — its Community REST API v3
# filters server-side, the exact thing Plane CE's API could NOT do,
# so the Claude Code integration works via the free op-query helper
# (OpenProject's first-party MCP is an Enterprise add-on).
#
# Deployed as the all-in-one image (openproject/openproject),
# which bundles Postgres + memcached + web + Rails workers in one
# container.
#
# ⚠️ BACKUP GAP (FORGE #455 follow-up): data currently lives in
# NAMED VOLUMES and is NOT covered by db-dumps / forge-ops-backup-
# rsync — a holdover from the pilot phase when Plane was the source
# of truth. Now that OpenProject IS the source of truth, it needs a
# real backup path: switch to bind mounts under
# {{ bezaforge_root }}/openproject (proper uid handling) + add its
# Postgres to db-dumps + the tree to rsync. Tracked separately.
# ============================================================

# Upstream release pin (all-in-one image tag). Verified current
# stable 2026-07-12 (released 2026-07-08). Renovate tracks this.
openproject_release: "17.6.0"

# Public URL — Traefik routes pm.bezaforge.dev → this container on
# bezaforge-net. AdGuard rewrites the host to 10.10.20.20. The
# hostname is deliberately tool-agnostic (pm, not openproject) so a
# future tool swap doesn't churn DNS/bookmarks/muscle-memory.
openproject_host: "pm.{{ domain }}"
openproject_url: "https://pm.{{ domain }}"

# Internal Docker network (created by the docker role).
openproject_network: bezaforge-net
