# OpenProject all-in-one — the live work tracker (replaced Plane
# 2026-07, FORGE #455).
#
# The openproject/openproject image bundles Postgres + memcached +
# web + Rails workers under an internal supervisor. It listens on
# container port 80; Traefik fronts TLS (OPENPROJECT_HTTPS=true in
# .env forces https URL generation behind the proxy).
#
# ⚠ First boot is SLOW (~5-10 min): the container runs DB init +
# migrations + asset seeding before the web server answers. A 502
# from Traefik during that window is expected — wait it out.
#
# Backups (#471): pgdata + assets are bind-mounted under
# /opt/bezaforge/openproject, so forge-ops-backup-rsync captures the
# tree. The authoritative DB restore path is the app-consistent
# logical dump in the db-dumps role (openproject entry, dump_cmd).
#
# Traefik labels: router/service = openproject, websecure,
# letsencrypt, :80.

networks:
  bezaforge-net:
    external: true

services:
  openproject:
    image: openproject/openproject:${OPENPROJECT_RELEASE}
    container_name: openproject
    restart: unless-stopped
    env_file: .env
    volumes:
      # Bind mounts under the install dir (#471) — so the tree is captured by
      # forge-ops-backup-rsync like every other service, and a `down -v` can't
      # wipe the DB. Paths are relative to this compose file's dir
      # (/opt/bezaforge/openproject). Docker creates them empty on a fresh
      # deploy (the image's entrypoint chowns + initdb's); on the migration
      # from named volumes they were pre-populated with `cp -a`.
      - ./pgdata:/var/openproject/pgdata
      - ./assets:/var/openproject/assets
    networks:
      - bezaforge-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=bezaforge-net"
      - "traefik.http.routers.openproject.rule=Host(`${OPENPROJECT_HOST}`)"
      - "traefik.http.routers.openproject.entrypoints=websecure"
      - "traefik.http.routers.openproject.tls.certresolver=letsencrypt"
      - "traefik.http.services.openproject.loadbalancer.server.port=80"
