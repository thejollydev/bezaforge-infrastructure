---
# ============================================================
# openproject role — OpenProject Community (all-in-one)
#
# The live work tracker (replaced Plane 2026-07, FORGE #455). Deploys
# the openproject/openproject all-in-one container behind Traefik at
# pm.bezaforge.dev. pgdata + assets are bind-mounted under
# {{ bezaforge_root }}/openproject (#471) — this role does NOT create
# or chown those dirs (the image's entrypoint owns pgdata/assets uids;
# managing them here would revert the uids, the outline-role trap).
# Docker creates them empty on a fresh deploy.
#
# Dependencies: docker role (creates bezaforge-net), traefik role
# (TLS via the letsencrypt certresolver).
#
# Post-deploy: first boot takes ~5-10 min (DB init + migrations +
# seeding). Then log in at https://pm.bezaforge.dev as `admin` with
# the seeded password and change it. See defaults/main.yml.
# ============================================================

- name: Create OpenProject install root
  ansible.builtin.file:
    path: "{{ bezaforge_root }}/openproject"
    state: directory
    owner: joseph
    group: joseph
    mode: "0755"

- name: Deploy OpenProject docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: "{{ bezaforge_root }}/openproject/docker-compose.yml"
    owner: joseph
    group: joseph
    mode: "0644"

- name: Deploy OpenProject .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ bezaforge_root }}/openproject/.env"
    owner: joseph
    group: joseph
    mode: "0600"

- name: Start OpenProject
  community.docker.docker_compose_v2:
    project_src: "{{ bezaforge_root }}/openproject"
    state: present
    remove_orphans: true
