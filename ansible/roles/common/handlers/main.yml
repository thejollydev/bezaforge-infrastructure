---
# Handlers only run when notified by a task that made a change.
# If SSH config is already hardened, restart sshd never fires.
# This is critical on a production host — unnecessary restarts
# of sshd briefly drop all SSH connections.

- name: restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
