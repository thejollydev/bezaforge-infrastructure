---
# ============================================================
# cognee role — shared memory service on forge-ops
#
# Two containers (cognee backend + cognee-mcp). Ingress is via
# Traefik labels on bezaforge-net — no published host port, so
# no UFW rule (unlike brizza-postgres, which is reached remotely).
#
# Dependencies: docker role (creates bezaforge-net), traefik role
# (terminates TLS for memory.bezaforge.dev), the gdrive NFS mount
# (host_vars/forge-ops/vars.yml nfs_mounts) for the vault bind.
# ============================================================

- name: Create Cognee install root + data dirs
  ansible.builtin.file:
    path: "{{ bezaforge_root }}/cognee/{{ item }}"
    state: directory
    owner: joseph
    group: joseph
    mode: "0775"
  loop:
    - "."
    - data
    - system

# NOTE: data/ + system/ are app-writable and left joseph-owned (matches
# the working live deploy). The cognee container writes there as root, so
# joseph ownership doesn't block it — and unlike the brizza-postgres uid-70
# trap, re-running this task is safe (no entrypoint chown to fight).

- name: Deploy Cognee docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ bezaforge_root }}/cognee/docker-compose.yml"
    owner: joseph
    group: joseph
    mode: "0644"

- name: Deploy Cognee .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ bezaforge_root }}/cognee/.env"
    owner: joseph
    group: joseph
    mode: "0600"

- name: Start Cognee
  community.docker.docker_compose_v2:
    project_src: "{{ bezaforge_root }}/cognee"
    state: present
    remove_orphans: true
