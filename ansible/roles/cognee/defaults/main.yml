---
# ============================================================
# cognee role defaults — shared memory service on forge-ops
#
# Two containers on bezaforge-net:
#   - cognee      : API backend (sqlite + lancedb + kuzu), healthchecked,
#                   internal only (no published port)
#   - cognee-mcp  : MCP server, Traefik-routed at memory.bezaforge.dev,
#                   consumed by Claude Code / Codex / Gemini (Brizza uses
#                   the cognee-integration-langgraph package directly, not
#                   this MCP — Brizza ADR 0001).
#
# The Master-Mind vault is bind-mounted READ-ONLY at /vault.
# LLM is cloud Gemini (API key, paid tier = no-train); embeddings stay
# LOCAL on forge-ai (Ollama /api/embed) — mixing providers is safe.
#
# Secrets (ansible-vault, host_vars/forge-ops/vault.yml):
#   cognee_api_token             — MCP->backend token, NOT client-facing auth
#   vault_cognee_gemini_api_key  — Gemini API key for extraction LLM
# Backups: data/ + system/ bind-mounts via forge-ops-backup-rsync
#          (added to backup_services alongside this role). No db-dumps
#          entry — Cognee is sqlite, not Postgres.
# ============================================================

# Image pins — pinned by DIGEST, not the :main tag. The :main tag MOVES
# silently (confirmed: the same cognee-mcp image reported 1.1.0 on
# 2026-05-25 and 1.27.0 on 2026-05-29). Pin for reproducibility; bump
# these digests deliberately to upgrade. See reference_cognee_deploy_gotchas.
cognee_image: "cognee/cognee@sha256:9c9e4e526c261b2a71e031a5774a23dc7a979c6bb8c8cf630d0e2f41629c5778"          # :main @ 2026-05-20
cognee_mcp_image: "cognee/cognee-mcp@sha256:03cb2e88d4e27bcab854c490b2dd766afce9bf5512a6d0e226294b6bb0fa55bf"  # :main @ 2026-05-24

# Internal Docker network (created by the docker role).
cognee_network: bezaforge-net

# Traefik route host for the MCP server.
cognee_hostname: "memory.bezaforge.dev"

# Master-Mind vault — bind-mounted read-only into the backend at /vault.
# ADR 0002 (2026-06-06): the vault left Google Drive; this is now the
# bezapool/vault git clone (repo root — ingest tooling excludes dot-dirs,
# so .git is invisible to it). RO at every layer: NFS export, fstab, bind.
cognee_vault_mount: "/mnt/bezapool/vault"

# LLM — LOCAL reasoning model on forge-ai (FORGE-5, 2026-06-09; replaced the
# cloud Gemini plan after a full local bake-off — Cognee KB doc + journal).
# Cognee recommends a reasoning model for cleaner graphs; qwen3.6-35B-A3B
# (MoE, ~3B active) is the newest/biggest that fits the 20 GB card at Q3.
# $0/run + private. ~6x slower than a non-reasoning model → overnight ingest.
#
# Ollama wiring rules (verified FORGE-5; Cognee's OllamaAPIAdapter wraps a raw
# OpenAI client with instructor, NOT litellm routing):
#   - LLM_MODEL = the BARE local tag (an `ollama/` prefix 404s). This is the
#     16k-context custom build (roles/ollama ollama_modelfiles on forge-ai),
#     NOT the bare GGUF — Cognee's ~5k-token prompt + the reasoning trace
#     overflow a small default context → finish_reason=length → retry loop.
#   - LLM_ENDPOINT keeps the `/v1` suffix (OpenAI SDK appends /chat/completions)
#     and uses the FQDN (single-label names pay a ~3.85s LLMNR tax per call).
#   - LLM_INSTRUCTOR_MODE = `tool_call` is REQUIRED for a reasoning model: the
#     default `json_mode` lets it free-write past the context → retry loop.
#     tool_call constrains it straight to the schema (reasoning intact, no
#     loop). Model-specific: Devstral (non-reasoning) needs json_mode instead.
cognee_llm_provider: "ollama"
cognee_llm_model: "qwen36-moe-16k:latest"
cognee_llm_endpoint: "http://forge-ai.bezaforge.dev:11434/v1"
cognee_llm_instructor_mode: "tool_call"
# Rate limiters — BOTH REQUIRED at ingest scale (FORGE-5 pilot failure,
# 2026-06-04): Cognee's embedding engine fires ONE concurrent HTTP request
# PER text chunk (asyncio.gather, unbounded, 60s client timeout). The pilot's
# flood wedged Ollama's single embed runner → client timeouts → pipeline
# error. (Logged as "Status code: 422" — that's EmbeddingException's DEFAULT
# status code, NOT an HTTP response; the wrapped error was TimeoutError.)
# Cognee's built-in AsyncLimiter is a no-op unless explicitly enabled.
#
# LOCAL model (FORGE-5, 2026-06-09): no external quota anymore, so these are
# now FLOW-CONTROL on Cognee's unbounded per-chunk asyncio.gather, not a
# provider cap. The reasoning LLM is the bottleneck (minutes/call), so 20/min
# never actually binds — it just keeps the request queue from ballooning.
# Embedding 60/min keeps bge-m3 (co-resident, see OLLAMA_MAX_LOADED_MODELS=2)
# from being flooded. Tunable once the full ingest gives real throughput data.
cognee_llm_rate_limit_requests: 20
cognee_embedding_rate_limit_requests: 60
cognee_rate_limit_interval: 60

# Embeddings stay LOCAL on forge-ai (Ollama). HUGGINGFACE_TOKENIZER is
# MANDATORY with custom Ollama embeddings (backend crash-loops without it).
# bge-m3 (FORGE-5, 2026-06-09): better retrieval than nomic + native 8192
# context (so chunks up to ~8k embed cleanly — no more "input length exceeds"
# overflow), and tiny (0.7 GB loaded) so it CO-RESIDES with the 17 GB reasoning
# LLM on the 21.4 GB card (qwen3-embedding-4b at 4.4 GB would not — it'd evict
# the LLM). NOTE: dims change 768→1024, so the LanceDB store must be fresh
# (a clean full ingest — which FORGE-5 is — avoids the dimensional mismatch).
cognee_embedding_model: "bge-m3"
# OllamaEmbeddingEngine POSTs DIRECTLY to this URL (it is not a base — the
# engine's own default is ".../api/embed"). So it must be the FULL native
# embed path, not the bare host. The codified deploy had bare `…:11434`,
# which POSTed to Ollama's root → embedding connection test hung to 30s
# (same invisible-until-first-ingest bug as the LLM line). Verified: POST
# `…/api/embed` {model,input,dimensions} returns vectors. (FORGE-5, 2026-06-02)
#
# FQDN, not the bare "forge-ai" (2026-06-04, FORGE-5 pilot failure #2): a
# single-label name from inside the container detours through systemd-resolved
# LLMNR multicast = ~3.85s per lookup (vs 28ms for the FQDN via the AdGuard
# rewrite) — and Cognee opens a fresh session PER embed request, so every call
# paid it; concurrent lookups stacked past the 60s client timeout and killed
# cognify. LLMNR is also disabled host-wide in roles/common (the root fix);
# the FQDN keeps this role correct independent of host resolver config.
cognee_embedding_endpoint: "http://forge-ai.bezaforge.dev:11434/api/embed"
cognee_embedding_dimensions: 1024
cognee_hf_tokenizer: "BAAI/bge-m3"
