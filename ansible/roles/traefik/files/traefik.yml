global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: bezaforge-net
  file:
    directory: /etc/traefik/dynamic/
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: joseph@bezacore.com
      storage: /certs/acme.json
      dnsChallenge:
        provider: cloudflare
        # Use public resolvers for zone-detection + propagation checks.
        # The container resolves via AdGuard (split-horizon *.bezaforge.dev
        # → forge-ops), which returns no SOA for the apex, so lego's zone
        # walk mis-detects the apex as `dev.` and ACME fails. Public
        # resolvers see Cloudflare's real SOA. (FORGE-22)
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
        propagation:
          delayBeforeChecks: 30s
