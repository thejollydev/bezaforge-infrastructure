---
# ============================================================
# traefik role — reverse proxy + SSL via Cloudflare DNS challenge
#
# Traefik is the foundation for all web services in BezaForge.
# It handles:
# - HTTP → HTTPS redirection (all traffic is encrypted)
# - Automatic SSL cert issuance via Let's Encrypt DNS challenge
# - Routing requests to the correct Docker container by hostname
# - Dashboard at traefik.bezaforge.dev (basicauth protected)
#
# Dependencies: docker role (bezaforge-net must exist)
# Secrets: cloudflare_dns_api_token, traefik_basicauth_hash
#          (stored in ansible-vault encrypted vars file)
# ============================================================

# ------------------------------------------------------------
# Config files
# ------------------------------------------------------------
# Traefik has two types of configuration:
#
# Static config (traefik.yml) — loaded once at startup. Defines
# entrypoints (ports), providers (Docker, file), and cert
# resolvers. Changes require a container restart.
#
# Dynamic config (middleware.yml) — watched by Traefik's file
# provider. Changes are picked up automatically without restart.
# This is where security headers and other middleware live.

- name: Create dynamic config directory
  ansible.builtin.file:
    path: "{{ bezaforge_root }}/traefik/config/dynamic"
    state: directory
    owner: joseph
    group: joseph
    mode: '0755'

- name: Deploy Traefik static config
  ansible.builtin.copy:
    src: traefik.yml
    dest: "{{ bezaforge_root }}/traefik/config/traefik.yml"
    owner: joseph
    group: joseph
    mode: '0644'
  notify: restart traefik

- name: Deploy Traefik dynamic middleware config
  ansible.builtin.copy:
    src: middleware.yml
    dest: "{{ bezaforge_root }}/traefik/config/dynamic/middleware.yml"
    owner: joseph
    group: joseph
    mode: '0644'
  # No restart needed — Traefik's file provider watches this
  # directory and picks up changes automatically

# ------------------------------------------------------------
# SSL certificate storage
# ------------------------------------------------------------
# acme.json stores all SSL certificates and private keys issued
# by Let's Encrypt. Traefik REQUIRES this file to be mode 0600
# (owner read/write only) and refuses to start if it's more
# permissive. This prevents other processes from reading your
# private keys.
#
# The file is owned by root because the Traefik container runs
# as root inside the container, and the volume mount preserves
# the host file ownership.
#
# modification_time/access_time: preserve — prevents the 'touch'
# module from updating timestamps on every run, which would
# cause 'changed' every time and break idempotency.

- name: Create acme.json for certificate storage
  ansible.builtin.file:
    path: "{{ bezaforge_root }}/traefik/certs/acme.json"
    state: touch
    owner: root
    group: root
    mode: '0600'
    modification_time: preserve
    access_time: preserve

# ------------------------------------------------------------
# Docker Compose
# ------------------------------------------------------------
# The compose file is a Jinja2 template because it contains:
# - production_ip (binds ports to specific IP, not 0.0.0.0)
# - cloudflare_dns_api_token (secret — from vault-encrypted vars)
# - traefik_basicauth_hash (secret — from vault-encrypted vars)
# - domain (bezaforge.dev — from host_vars)
#
# Using a template means secrets never appear in plain text in
# the git repo. They're injected at deploy time from the
# ansible-vault encrypted file.
#
# mode 0600 on the rendered file — it contains secrets in
# plain text after rendering, so restrict read access.
#
# notify: restart traefik — only restarts if the rendered
# compose file differs from what's on disk. If nothing changed,
# Traefik keeps running untouched.

- name: Deploy Traefik docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ bezaforge_root }}/traefik/docker-compose.yml"
    owner: joseph
    group: joseph
    mode: '0600'
  notify: restart traefik

# ------------------------------------------------------------
# Start Traefik
# ------------------------------------------------------------
# community.docker.docker_compose_v2 is the Ansible module for
# 'docker compose' v2 (the Go-based plugin). It reads the
# compose file and ensures the service is running.
#
# state: present — start containers if not running, but don't
# restart if already running. The handler handles restarts
# when config changes.

- name: Start Traefik
  community.docker.docker_compose_v2:
    project_src: "{{ bezaforge_root }}/traefik"
    state: present
