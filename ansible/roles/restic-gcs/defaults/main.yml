---
# ============================================================
# restic-gcs role defaults
#
# Daily restic backup of bezapool/forge-ops-backup → Google
# Cloud Storage Nearline bucket. Runs on forge-hypervisor.
# Per ADR 0001.
#
# Secrets (gcs_credentials_json, restic_password) MUST come
# from the encrypted vault — NEVER set them in this file or
# in vars.yml. Defaults here are non-secret config knobs only.
# ============================================================

# ------------------------------------------------------------
# What to back up
# ------------------------------------------------------------
# Restic reads these paths directly from the live ZFS dataset.
# Scheduled at 04:00 EDT — well after the 02:45 rsync has settled.
# Future iteration: switch to backing up a ZFS snapshot mount
# (e.g. /bezapool/forge-ops-backup/.zfs/snapshot/<latest>/) for
# point-in-time consistency. v1 trades that for simplicity.
restic_backup_sources:
  - /bezapool/forge-ops-backup
  # Master-Mind vault clone (ADR 0002, 2026-06-06). Replaces the Drive-era
  # exemption (ADR 0001 Alt F — "already off-site via Google Drive"): the
  # vault left Drive, so it joins the GCS off-site set. ~140 MB, negligible.
  - /bezapool/vault
  # forge-brizza ~/.hermes mirror (FORGE-25, 2026-06-12). Lands at 03:45
  # via hermes-backup-rsync on forge-brizza — inside this 04:00 window,
  # so GCS carries same-night session exports + state snapshots. ~600 MB.
  - /bezapool/brizza-backup
  # forge-erp ERPNext app-consistent bench backups (FORGE-60/61/62,
  # 2026-06-17). Pushed nightly at 03:30 by forge-erp-backup.sh on forge-erp —
  # inside this 04:00 window, so GCS carries same-night financial dumps. ~1 MB.
  - /bezapool/forge-erp-backup
  # sharepool/files documents share (ADR 0003 Bucket B, FORGE-85). Read from
  # the LIVE dataset (same host — freshest copy; the role's documented v1
  # live-read tradeoff), NOT the bezapool/sharepool-backup syncoid replica
  # (that would double-store the same data in the repo). The nested
  # GoogleDrive/ rclone FUSE mount is excluded below.
  - /sharepool/files

# Paths restic must NOT descend into. Restic walks the real filesystem,
# so without this the nested rclone FUSE mount at
# /sharepool/files/GoogleDrive would pull the ENTIRE ~350 GB Google
# Drive into Nearline — and a hung rclone mount would hang the whole
# nightly backup run. Drive's own master copy + the one-way
# roles/gdrive-replica mirror already cover that data.
restic_backup_excludes:
  - /sharepool/files/GoogleDrive

# Daily fire at 04:00 — sanoid's 03:00 daily snapshot will already
# include the latest rsync/dumps from 02:30+02:45, so restic backs
# up a consistent steady-state.
restic_schedule: "*-*-* 04:00:00"

# A separate weekly integrity check (full restic check, no data
# transfer). Pulls and verifies metadata in the repo.
restic_check_schedule: "Sun *-*-* 05:00:00"

# ------------------------------------------------------------
# Retention (managed via restic forget --keep-* after each backup)
# ------------------------------------------------------------
# All values ≥ 30 days so Nearline minimum-storage doesn't bite.
restic_keep_daily: 7
restic_keep_weekly: 4
# Bumped 6→12 + added yearly for financial-grade offsite retention of the
# forge-erp ERPNext dumps (FORGE-62). restic forget is repo-global, so all
# sources gain it; the others are small + dedup'd, so the extra Nearline
# cost is minor.
restic_keep_monthly: 12
restic_keep_yearly: 3

# ------------------------------------------------------------
# Local config locations
# ------------------------------------------------------------
restic_etc_dir: /etc/bezaforge
restic_password_file: "{{ restic_etc_dir }}/restic-password"
restic_gcs_credentials_file: "{{ restic_etc_dir }}/gcs-backup-sa.json"

# ------------------------------------------------------------
# GCS / restic repository config (NON-secret defaults)
# ------------------------------------------------------------
# Override these per-host in host_vars/forge-hypervisor.yml
# once the GCS bucket is created. Bucket name will be something
# like bezaforge-backups-<random-suffix>.
gcs_project_id: ""
gcs_bucket: ""
restic_repository: "gs:{{ gcs_bucket }}:/"

# Hostname tag — embedded in each snapshot's metadata.
restic_hostname: "forge-hypervisor"
