---
# ============================================================
# ollama role — Ollama LLM runtime on forge-ai
#
# Codifies the manual Phase 1 install. Ollama has been running
# on forge-ai since 2026-03-02; this role brings it under config
# management without destructive change to the live install.
#
# ROCm GPU prerequisites (rocm-smi, libdrm-dev, GPU access groups)
# are codified in roles/rocm, which runs before this role on
# gpu_hosts (FORGE-29). This role adds the `ollama` service user to
# the GPU groups once the install script has created that user.
#
# Idempotency:
#   - install task is skipped when the binary is at the desired
#     version (or any version, when ollama_version is "")
#   - systemd unit drop-in writes only on change → reload + restart
#   - `ollama pull` is itself idempotent (no-op when up-to-date)
# ============================================================

# ------------------------------------------------------------
# Install
# ------------------------------------------------------------
# The upstream install script (https://ollama.com/install.sh):
#   * detects GPU (ROCm/CUDA) and installs the matching binary
#   * creates the `ollama` system user
#   * drops a systemd unit at /etc/systemd/system/ollama.service
#   * starts the service
#
# It's idempotent — re-running upgrades in place. We gate it on
# version drift so the play stays fast and quiet.

- name: Probe installed ollama version
  ansible.builtin.command: ollama --version
  register: ollama_version_probe
  changed_when: false
  failed_when: false
  check_mode: false

- name: Compute install-needed flag
  ansible.builtin.set_fact:
    ollama_install_needed: >-
      {{
        (ollama_install_method == 'script') and (
          ollama_version_probe.rc != 0 or
          (ollama_version | length > 0 and ollama_version not in ollama_version_probe.stdout)
        )
      }}

- name: Install Ollama via upstream script
  ansible.builtin.shell: >
    set -o pipefail;
    curl -fsSL https://ollama.com/install.sh
    {% if ollama_version | length > 0 %}| OLLAMA_VERSION={{ ollama_version | quote }} sh{% else %}| sh{% endif %}
  args:
    executable: /bin/bash
  when: ollama_install_needed | bool
  changed_when: true
  notify:
    - reload systemd
    - restart ollama

# ------------------------------------------------------------
# GPU access for the ollama service user
# ------------------------------------------------------------
# The `ollama` user (created by the install script above) needs the
# render + video groups to reach /dev/kfd and /dev/dri/renderD* for
# ROCm compute. System-level ROCm setup is roles/rocm (FORGE-29).
- name: Add the ollama service user to the GPU access groups
  ansible.builtin.user:
    name: ollama
    groups: "{{ ollama_gpu_groups }}"
    append: true
  notify: restart ollama

# ------------------------------------------------------------
# Data dir
# ------------------------------------------------------------
# Models live on the docker LV, not the root partition. The
# `ollama` user is created by the install script.

- name: Ensure models directory exists
  ansible.builtin.file:
    path: "{{ ollama_models_dir }}"
    state: directory
    owner: ollama
    group: ollama
    mode: "0755"

# ------------------------------------------------------------
# systemd drop-in + environment file
# ------------------------------------------------------------
# We don't replace the upstream-shipped unit — we layer a
# drop-in that sources /etc/default/ollama. Changes to the
# env file trigger a restart; changes to the override.conf
# trigger daemon-reload + restart.

- name: Create systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render ollama systemd drop-in
  ansible.builtin.template:
    src: override.conf.j2
    dest: /etc/systemd/system/ollama.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart ollama

- name: Render ollama environment file
  ansible.builtin.template:
    src: ollama.env.j2
    dest: /etc/default/ollama
    owner: root
    group: root
    mode: "0644"
  notify: restart ollama

# ------------------------------------------------------------
# Service enable + start
# ------------------------------------------------------------

- name: Ensure ollama is enabled and running
  ansible.builtin.systemd:
    name: ollama
    enabled: true
    state: started

# ------------------------------------------------------------
# Firewall — allow API from approved VLANs
# ------------------------------------------------------------
# UFW is already enabled by roles/common. Each rule below is
# idempotent — UFW deduplicates by source/port/proto.

- name: Open ollama API port to approved VLANs
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    to_port: "{{ ollama_host.split(':')[-1] }}"
    proto: tcp
    comment: "ollama API (managed by ansible/roles/ollama)"
  loop: "{{ ollama_ufw_allow_from }}"
  when: ollama_ufw_allow_from | length > 0

# ------------------------------------------------------------
# Model seeding
# ------------------------------------------------------------
# `ollama pull` is itself idempotent: if the model + tag is
# already present at the expected digest, it exits 0 immediately.
# We run after a flush so the service is using the final config.

- name: Flush handlers before seeding models
  ansible.builtin.meta: flush_handlers

- name: Seed configured models
  ansible.builtin.command: "ollama pull {{ item }}"
  loop: "{{ ollama_models }}"
  register: ollama_pull_result
  changed_when: "'pulling' in (ollama_pull_result.stdout | default('') | lower)"
  failed_when:
    - ollama_models_fail_on_error | bool
    - ollama_pull_result.rc != 0
  when: ollama_models | length > 0
  environment:
    OLLAMA_HOST: "{{ ollama_host }}"

# ------------------------------------------------------------
# Custom models (Modelfile builds) — e.g. context-length pins
# ------------------------------------------------------------
# Runs AFTER seeding so each Modelfile's `from:` base is present.
# `ollama create` only re-runs when the rendered Modelfile changed.

- name: Create Modelfile directory
  ansible.builtin.file:
    path: /etc/ollama/modelfiles
    state: directory
    owner: ollama
    group: ollama
    mode: "0755"
  when: ollama_modelfiles | length > 0

- name: Render custom-model Modelfiles
  ansible.builtin.template:
    src: Modelfile.j2
    dest: "/etc/ollama/modelfiles/Modelfile.{{ item.name }}"
    owner: ollama
    group: ollama
    mode: "0644"
  loop: "{{ ollama_modelfiles }}"
  loop_control:
    label: "{{ item.name }}"
  register: ollama_modelfile_render
  when: ollama_modelfiles | length > 0

- name: Build/update custom models from Modelfiles
  ansible.builtin.command: "ollama create {{ item.item.name }} -f {{ item.dest }}"
  loop: "{{ ollama_modelfile_render.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - ollama_modelfiles | length > 0
    - item.changed | default(false)
  changed_when: true
  environment:
    OLLAMA_HOST: "{{ ollama_host }}"
