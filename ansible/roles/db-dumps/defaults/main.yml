---
# ============================================================
# db-dumps role defaults
#
# Defines the schedule + container list for nightly Postgres
# dumps on forge-ops. Each entry maps a service (used as the
# subdirectory under the backup root) to its Postgres container.
# ============================================================

# Where dumps land. Must be the NFS mount of bezapool/forge-ops-backup
# (see forge-ops nfs_mounts in inventory/host_vars/forge-ops/vars.yml).
backup_root: /mnt/bezapool/forge-ops-backup

# Number of local gzipped dumps to keep per service. Anything
# older relies on sanoid snapshots for retention.
dump_retention_count: 14

# When to fire. systemd OnCalendar syntax.
# 02:30 EDT keeps it well clear of sanoid's :00/:15/:30/:45 ticks
# and before the rsync timer at 02:45.
dump_schedule: "*-*-* 02:30:00"

# Service ↔ container mapping. The 'service' name becomes the
# subdirectory under backup_root/; 'container' is what docker exec
# talks to. The superuser is auto-discovered at runtime by reading
# POSTGRES_USER from each container's env — no static config needed.
postgres_dumps:
  - service: gitea
    container: gitea-db
  - service: langfuse
    container: langfuse-db
  - service: netbox
    container: netbox-postgres
  - service: outline
    container: outline-db
  - service: plane
    # Plane CE's upstream compose sets no container_name, so the real
    # container is <project>-<service>-1 = plane-plane-db-1 (NOT the
    # 'plane-db' network alias the other containers connect through).
    # The plane role's OAuth-seed task uses the same name. Was 'plane-db'
    # → never matched → Plane's pg_dumpall failed silently + reddened the
    # whole db-dumps unit nightly since 2026-05-23. Fixed FORGE-2 2026-06-13.
    container: plane-plane-db-1
    # Plane's compose injects PGHOST=plane-db into EVERY container's env
    # (shared *db-env anchor), so an in-container pg_dumpall would connect
    # over TCP to the plane-db alias and hit password auth (fe_sendauth: no
    # password supplied). Force libpq back onto the local Unix socket. Only
    # plane needs this — the other 5 containers don't set PGHOST. (FORGE-2)
    pghost: /var/run/postgresql
  - service: brizza
    container: brizza-db
# harbor removed 2026-05-17 (retired — see ROADMAP carryover #8)
# wiki removed 2026-05-17 (Wiki.js retired — see ROADMAP carryover #21)
# taiga removed 2026-05-22 (Taiga retired — replaced by Plane per guide 12)
