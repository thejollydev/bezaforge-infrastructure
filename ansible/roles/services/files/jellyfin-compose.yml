# Jellyfin media server. Simple service (no secrets — admin is set in the UI).
# Codified 2026-06-27 (FORGE-67) from the prior manual deploy at
# /opt/bezaforge/jellyfin/. HW-accelerated transcoding via the host iGPU:
#   - devices: /dev/dri/renderD128 passthrough
#   - group_add 992 (render) + 44 (video) — the host GIDs that own the DRI
#     device nodes. Re-verify with `getent group render video` on forge-ops if
#     transcoding breaks after a host/kernel change.
# Media is mounted read-only; Jellyfin never writes to the library.
networks:
  bezaforge-net:
    external: true

services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db
    container_name: jellyfin
    user: "1000:1000"
    group_add:
      - "992"
      - "44"
    volumes:
      - /opt/bezaforge/jellyfin/config:/config
      - /opt/bezaforge/jellyfin/cache:/cache
      - /mnt/bezapool/media:/media:ro
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    restart: unless-stopped
    networks:
      - bezaforge-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.bezaforge.dev`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
