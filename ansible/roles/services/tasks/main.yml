---
# Services role — deploys all application compose stacks
#
# Services fall into three categories based on how secrets are managed:
#   1. Template services (gitea, taiga) — secrets baked into compose via Jinja2
#   2. Env-var services (netbox, langfuse, homepage) — compose uses ${VAR}, secrets in .env file
#   3. Simple services (uptime-kuma, calibre-web) — no secrets at all
#
# (wiki was a template service; retired 2026-05-17 per ROADMAP carryover #21)
#
# We don't need handlers here. The "start stack" task at the bottom runs
# docker compose up -d for every service. If a compose file or .env changed,
# Docker detects the diff and recreates affected containers automatically.

# --- Ensure every service has its install dir ---
# ansible.builtin.copy/template do NOT create missing parent directories,
# so a brand-new service (e.g. open-webui, added 2026-06-14) fails its first
# deploy with "Destination directory ... does not exist". Existing services
# are no-ops. (brizza-postgres creates its own install dir in its role; this
# covers everything driven by the services role.)
- name: Ensure service install dirs exist
  ansible.builtin.file:
    path: "{{ bezaforge_root }}/{{ item }}"
    state: directory
    owner: joseph
    group: joseph
    mode: "0755"
  loop: "{{ compose_services }}"

# --- LangFuse MinIO backup-export staging dir (FORGE-64) ---
# The langfuse-minio container bind-mounts /opt/bezaforge/langfuse/minio at
# /export and the minio-exports role execs `mc mirror` into it. Chainguard's
# distroless MinIO runs as nonroot uid 65532, so the dir must be pre-created
# with that ownership — otherwise Docker auto-creates the bind-mount source as
# root:root and mc (nonroot) can't write the mirror. Numeric id is used because
# the user/group name doesn't exist on the forge-ops host (it's a container uid).
- name: Ensure langfuse minio export staging dir exists (owned by minio nonroot uid)
  ansible.builtin.file:
    path: "{{ bezaforge_root }}/langfuse/minio"
    state: directory
    owner: "65532"
    group: "65532"
    mode: "0755"
  when: "'langfuse' in compose_services"

# --- Template services (secrets in compose file) ---

- name: Deploy templated compose files (secrets in compose)
  ansible.builtin.template:
    src: "{{ item }}-compose.yml.j2"
    dest: "{{ bezaforge_root }}/{{ item }}/docker-compose.yml"
    owner: joseph
    group: joseph
    mode: "0600"
  loop: "{{ compose_services | intersect(['gitea']) }}"
# taiga removed from intersect list 2026-05-22 (retired — Plane replacement live).
# When the next template service lands (something else needing secrets baked into
# compose vs .env-file), add it here.

# --- Env-var services (secrets in .env file) ---

- name: Deploy env-var service compose files
  ansible.builtin.copy:
    src: "{{ item }}-compose.yml"
    dest: "{{ bezaforge_root }}/{{ item }}/docker-compose.yml"
    owner: joseph
    group: joseph
    mode: "0644"
  loop: "{{ compose_services | intersect(['netbox', 'langfuse', 'homepage', 'open-webui', 'seedbox']) }}"

- name: Deploy env-var service .env files
  ansible.builtin.template:
    src: "{{ item }}-env.j2"
    dest: "{{ bezaforge_root }}/{{ item }}/.env"
    owner: joseph
    group: joseph
    mode: "0600"
  loop: "{{ compose_services | intersect(['netbox', 'langfuse', 'homepage', 'open-webui', 'seedbox']) }}"

# --- Homepage config + brand assets ---
# Homepage's YAML config and image assets are version-controlled in
# docker/homepage/{config,images}/ at the repo root. The compose file already
# bind-mounts those paths into the container. gethomepage hot-reloads its
# YAML on disk change, so an explicit restart is only triggered when the
# images dir changes (the container caches /app/public/images at boot).

- name: Ensure homepage subdirs exist
  ansible.builtin.file:
    path: "{{ bezaforge_root }}/homepage/{{ item }}"
    state: directory
    owner: joseph
    group: joseph
    mode: "0755"
  loop:
    - config
    - images
  when: "'homepage' in compose_services"

- name: Deploy homepage YAML config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker/homepage/config/"
    dest: "{{ bezaforge_root }}/homepage/config/"
    owner: joseph
    group: joseph
    mode: "0644"
    directory_mode: "0755"
  when: "'homepage' in compose_services"
  register: services_homepage_config

- name: Deploy homepage brand images
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker/homepage/images/"
    dest: "{{ bezaforge_root }}/homepage/images/"
    owner: joseph
    group: joseph
    mode: "0644"
    directory_mode: "0755"
  when: "'homepage' in compose_services"
  register: services_homepage_images

# Homepage is supposed to hot-reload services.yaml on disk change, but
# the page is served as a pre-rendered Next.js SSG chunk — the rendered
# HTML stays cached until the container is replaced. Caught 2026-05-17
# while removing the Wiki.js card. A soft `state: restarted` cleared it
# then, but on 2026-06-13 (removing the retired Cognee card) restart was
# NOT enough — /api/services updated but the served HTML kept the stale
# Next.js full-route cache. A force-recreate (fresh container → fresh
# .next cache) is the reliable clear, so recreate (not restart) on change.
- name: Recreate homepage when config or brand images change
  community.docker.docker_compose_v2:
    project_src: "{{ bezaforge_root }}/homepage"
    state: present
    recreate: always
  when:
    - "'homepage' in compose_services"
    - services_homepage_config.changed or services_homepage_images.changed

# --- Simple services (no secrets) ---

- name: Deploy simple service compose files
  ansible.builtin.copy:
    src: "{{ item }}-compose.yml"
    dest: "{{ bezaforge_root }}/{{ item }}/docker-compose.yml"
    owner: joseph
    group: joseph
    mode: "0644"
  loop: "{{ compose_services | intersect(['uptime-kuma', 'calibre-web', 'jellyfin']) }}"

# --- Start all services ---
# docker_compose_v2 with state: present runs "docker compose up -d".
# If compose files or .env changed, Docker recreates affected containers.
# If nothing changed, this is a no-op — idempotent.

- name: Start service stacks
  community.docker.docker_compose_v2:
    project_src: "{{ bezaforge_root }}/{{ item }}"
    state: present
    remove_orphans: true
  loop: "{{ compose_services }}"
