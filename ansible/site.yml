---
# ============================================================
# BezaForge Infrastructure — forge-hypervisor + forge-ops +
# forge-ai + forge-brizza
# ============================================================

- name: Configure BezaForge hypervisor
  hosts: hypervisor_hosts
  become: false  # ansible_user is root on forge-hypervisor

  roles:
    - role: sanoid
      tags: sanoid
    - role: restic-gcs
      tags: restic-gcs
    # ADR 0002 v1.2: the vault git actor lives on the dataset owner —
    # local ZFS IO only (git-over-NFS wedged on brizza's 7.0 kernel).
    - role: vault-sync
      tags: vault-sync
    # FORGE-35 Phase 5: one-way Drive→bezapool/gdrive nightly rclone
    # mirror, replacing retired Insync. Also on the dataset owner
    # (local IO beats walking 177 GB over NFS) — ADR 0002 D4 as
    # amended v1.4.
    - role: gdrive-replica
      tags: gdrive-replica
    # ADR 0003 Bucket B: one Samba share + a live RW rclone Google Drive
    # mount, on the hypervisor directly (already the rclone/vault-sync
    # services host — avoids the FUSE-in-unprivileged-LXC unknown).
    - role: fileshare
      tags: fileshare

- name: Configure BezaForge Docker hosts
  hosts: docker_hosts
  become: true

  roles:
    - role: common
      tags: common
    - role: fail2ban
      tags: fail2ban
    - role: docker
      tags: docker
    - role: traefik
      tags: traefik
    - role: adguard
      tags: adguard
    - role: monitoring
      tags: monitoring
    - role: services
      tags: services
    - role: outline
      tags: outline
    # OpenProject — self-hosted work tracking at pm.bezaforge.dev.
    # Replaced Plane 2026-07 (Plane retired, FORGE #455).
    - role: openproject
      tags: openproject
    - role: brizza-postgres
      tags: brizza-postgres
    - role: db-dumps
      tags: backups
    - role: minio-exports
      tags: backups
    - role: forge-ops-backup-rsync
      tags: backups

- name: Configure BezaForge GPU hosts
  hosts: gpu_hosts
  become: true

  roles:
    - role: common
      tags: common
    - role: guest-agent
      tags: guest-agent
    - role: fail2ban
      tags: fail2ban
    - role: rocm
      tags: rocm
    - role: ollama
      tags: ollama
    # ADR 0003 Bucket B consumer: mount the hypervisor's `files` SMB
    # share (docs + live two-way Google Drive) at /mnt/bezashare.
    - role: fileshare-client
      tags: fileshare-client

- name: Configure BezaForge assistant hosts
  hosts: assistant_hosts
  become: true

  roles:
    - role: fail2ban
      tags: fail2ban
    - role: forge-brizza
      tags: forge-brizza
    # FORGE-49: local vault clone for Hermes grounding — replaces the
    # NFS-RW mount (vaultsync-checkout-vs-NFS-reader race). Timer-only;
    # all hypervisor-specific behavior is disabled in host_vars.
    - role: vault-sync
      tags: vault-sync
    # ADR 0003 Bucket B consumer: mount the hypervisor's `files` SMB
    # share (docs + live two-way Google Drive) at /mnt/bezashare.
    - role: fileshare-client
      tags: fileshare-client

- name: Configure BezaForge ERP host
  hosts: erp_hosts
  become: true

  # forge-erp management (no `common` role — a first-touch UFW enable could
  # lock admin out of this otherwise-unmanaged host). erpnext (FORGE-30, the
  # frappe_docker app) deploys first so the stack is up before the forge-erp
  # backup layer (FORGE-60/61/62) runs.
  roles:
    - role: erpnext
      tags: erpnext
    - role: forge-erp
      tags: forge-erp
