---
# ============================================================
# BezaForge Infrastructure — forge-hypervisor + forge-ops +
# forge-ai + forge-brizza
# ============================================================

- name: Configure BezaForge hypervisor
  hosts: hypervisor_hosts
  become: false  # ansible_user is root on forge-hypervisor

  roles:
    - role: sanoid
      tags: sanoid
    - role: restic-gcs
      tags: restic-gcs

- name: Configure BezaForge Docker hosts
  hosts: docker_hosts
  become: true

  roles:
    - role: common
      tags: common
    - role: docker
      tags: docker
    - role: traefik
      tags: traefik
    - role: adguard
      tags: adguard
    - role: monitoring
      tags: monitoring
    - role: services
      tags: services
    - role: outline
      tags: outline
    - role: plane
      tags: plane
    - role: db-dumps
      tags: backups
    - role: forge-ops-backup-rsync
      tags: backups

- name: Configure BezaForge GPU hosts
  hosts: gpu_hosts
  become: true

  roles:
    - role: common
      tags: common
    - role: ollama
      tags: ollama

- name: Configure BezaForge assistant hosts
  hosts: assistant_hosts
  become: true

  roles:
    - role: forge-brizza
      tags: forge-brizza
